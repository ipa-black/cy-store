<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CY STORE</title>
    <style>
        * {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            background: radial-gradient(circle at center, #1a2a3a 0%, #050a0f 100%);
            color: #ffffff; 
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            align-items: center;
            justify-content: center;
        }
        
        .content {
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 1.2s ease-out;
        }
        
        .app-icon {
            width: 140px;
            height: 140px;
            border-radius: 32px;
            box-shadow: 0 15px 45px rgba(0,0,0,0.6), 0 0 20px rgba(0, 119, 182, 0.2);
            object-fit: cover;
            animation: float 4s ease-in-out infinite;
        }
        
        .app-name {
            margin-top: 25px;
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 1.5px;
            color: #ffffff;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .bottom-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            padding-bottom: 40px;
        }
        
        .btn-install {
            background: linear-gradient(135deg, #f7c600, #d4aa00);
            color: #000000;
            font-size: 19px;
            font-weight: bold;
            padding: 16px 0;
            width: 90%;
            max-width: 350px;
            border-radius: 16px;
            text-decoration: none;
            text-align: center;
            box-shadow: 0 10px 25px rgba(247, 198, 0, 0.3);
            transition: transform 0.2s;
        }
        
        .btn-install:active {
            transform: scale(0.96);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="content">
        <img src="https://raw.githubusercontent.com/ipa-black/cy-store/refs/heads/main/1CE2CB8F-CB03-4E4E-9C58-AED43F2DBE4C.jpeg" class="app-icon">
        <div class="app-name">CY STORE</div>
    </div>

    <div class="bottom-bar">
        <a id="installBtn" class="btn-install">تثبيت التطبيق الآن</a>
    </div>

    <script>
        const encoded = "aXRtcy1zZXJ2aWNlczovLz9hY3Rpb249ZG93bmxvYWQtbWFuaWZlc3QmdXJsPWh0dHBzOi8vY3ktc3RvcmUudmVyY2VsLmFwcC9pbnN0YWxsLnBsaXN0";
        document.getElementById('installBtn').addEventListener('click', function(e) {
            e.preventDefault();
            window.location.href = atob(encoded);
        });

        document.addEventListener('contextmenu', event => event.preventDefault());
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && (e.key === 'c' || e.key === 'u' || e.key === 's' || e.key === '=' || e.key === '-')) {
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
