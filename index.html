<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOON mini app</title>
    <style>
        * {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            background-color: #000000; 
            color: #ffffff; 
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            font-size: 17px;
        }
        .header .close { color: #007aff; cursor: pointer; }
        .header .title { text-align: center; }
        .header .title div:first-child { font-weight: bold; font-size: 16px; }
        .header .title div:last-child { font-size: 12px; color: #8e8e93; }
        .header .more { font-size: 20px; }

        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding-bottom: 100px;
        }
        .app-icon {
            width: 120px;
            height: 120px;
            border-radius: 25px;
            box-shadow: 0 0 30px rgba(255,255,255,0.1);
            object-fit: cover;
        }

        .bottom-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            background-color: #0f1721;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            box-sizing: border-box;
            padding-bottom: 30px;
        }
        .btn-cancel {
            color: #8e8e93;
            font-size: 18px;
            font-weight: 500;
            text-decoration: none;
            padding: 10px 20px;
        }
        .btn-install {
            background-color: #f7c600;
            color: #000000;
            font-size: 18px;
            font-weight: bold;
            padding: 12px 60px;
            border-radius: 12px;
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(247, 198, 0, 0.2);
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="close">Close</div>
        <div class="title">
            <div>SOON</div>
            <div>mini app</div>
        </div>
        <div class="more">•••</div>
    </div>

    <div class="content">
        <img src="https://raw.githubusercontent.com/ipa-black/cy-store/refs/heads/main/1CE2CB8F-CB03-4E4E-9C58-AED43F2DBE4C.jpeg" class="app-icon">
    </div>

    <div class="bottom-bar">
        <a href="#" class="btn-cancel">إلغاء</a>
        <a id="installBtn" class="btn-install">تثبيت</a>
    </div>

    <script>
        const encoded = "aXRtcy1zZXJ2aWNlczovLz9hY3Rpb249ZG93bmxvYWQtbWFuaWZlc3QmdXJsPWh0dHBzOi8vY3ktc3RvcmUudmVyY2VsLmFwcC9pbnN0YWxsLnBsaXN0";
        document.getElementById('installBtn').addEventListener('click', function(e) {
            e.preventDefault();
            window.location.href = atob(encoded);
        });

        // منع النسخ والتقريب
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && (e.key === 'c' || e.key === 'u' || e.key === 's' || e.key === '=' || e.key === '-')) {
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
