<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>CY STORE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif; 
            background-color: #000000;
            color: #ffffff; 
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* خلفية متدرجة ناعمة تعطي شعوراً بالعمق */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 50% -20%, #1c2e4a 0%, #000000 70%);
            z-index: -1;
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            animation: appEntry 1s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .icon-wrapper {
            position: relative;
            margin-bottom: 30px;
        }

        .app-icon {
            width: 150px;
            height: 150px;
            border-radius: 35px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            object-fit: cover;
            display: block;
            animation: float 5s ease-in-out infinite;
        }

        /* تأثير توهج خلف الأيقونة */
        .icon-glow {
            position: absolute;
            top: 50%; left: 50%;
            width: 120%; height: 120%;
            background: radial-gradient(circle, rgba(0, 119, 182, 0.2) 0%, transparent 70%);
            transform: translate(-50%, -50%);
            z-index: -1;
        }

        .app-name {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(to bottom, #ffffff, #a2a2a2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .bottom-section {
            width: 100%;
            padding: 30px 25px calc(30px + env(safe-area-inset-bottom));
            background: linear-gradient(to top, rgba(15, 23, 33, 0.95), transparent);
            display: flex;
            justify-content: center;
        }

        .btn-install {
            background: #fcc419;
            color: #000000;
            font-size: 20px;
            font-weight: 700;
            padding: 18px 0;
            width: 100%;
            max-width: 400px;
            border-radius: 20px;
            text-decoration: none;
            text-align: center;
            box-shadow: 0 10px 30px rgba(252, 196, 25, 0.25);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-install:active {
            transform: scale(0.95);
            background: #e5b117;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        @keyframes appEntry {
            from { opacity: 0; transform: scale(0.85) translateY(30px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon-wrapper">
            <div class="icon-glow"></div>
            <img src="https://raw.githubusercontent.com/ipa-black/cy-store/refs/heads/main/1CE2CB8F-CB03-4E4E-9C58-AED43F2DBE4C.jpeg" class="app-icon">
        </div>
        <h1 class="app-name">CY STORE</h1>
    </div>

    <div class="bottom-section">
        <a id="installBtn" class="btn-install">تثبيت الآن</a>
    </div>

    <script>
        const encoded = "aXRtcy1zZXJ2aWNlczovLz9hY3Rpb249ZG93bmxvYWQtbWFuaWZlc3QmdXJsPWh0dHBzOi8vY3ktc3RvcmUudmVyY2VsLmFwcC9pbnN0YWxsLnBsaXN0";
        document.getElementById('installBtn').addEventListener('click', function(e) {
            e.preventDefault();
            window.location.href = atob(encoded);
        });

        // منع التفاعلات غير المرغوب فيها
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.addEventListener('keydown', e => {
            if (e.ctrlKey && ['c','u','s','=','-'].includes(e.key)) e.preventDefault();
        });
        
        // منع السحب للأسفل للتحديث في بعض المتصفحات
        document.addEventListener('touchmove', e => {
            if (e.touches.length > 1) e.preventDefault();
        }, { passive: false });
    </script>
</body>
</html>
