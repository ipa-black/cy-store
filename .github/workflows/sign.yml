name: Sign CY STORE Automation

on:
  workflow_dispatch:
    inputs:
      p12_base64:
        description: 'Base64 of p12 cert'
        required: true
      prov_base64:
        description: 'Base64 of mobileprovision'
        required: true
      password:
        description: 'p12 Password'
        required: true
      chat_id:
        description: 'Telegram Chat ID'
        required: true

jobs:
  sign_and_release:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Decode Certificates
        run: |
          echo "${{ github.event.inputs.p12_base64 }}" | base64 --decode > cert.p12
          echo "${{ github.event.inputs.prov_base64 }}" | base64 --decode > profile.mobileprovision

      - name: Install Dependencies
        run: |
          brew install zsign imagemagick

      - name: Inject Certs, Sign, and Force Icon Change
        run: |
          ORIGINAL_IPA=$(ls *.ipa | head -n 1)
          if [ -z "$ORIGINAL_IPA" ]; then
            echo "❌ لم يتم العثور على أي ملف IPA في المستودع!"
            exit 1
          fi
          
          unzip -q "$ORIGINAL_IPA" -d temp_ipa
          APP_DIR=$(ls temp_ipa/Payload/)
          
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier app.cystore" "temp_ipa/Payload/$APP_DIR/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleName CY STORE" "temp_ipa/Payload/$APP_DIR/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName CY STORE" "temp_ipa/Payload/$APP_DIR/Info.plist"

          ICON_URL="https://raw.githubusercontent.com/ipa-black/cy-store/refs/heads/main/1CE2CB8F-CB03-4E4E-9C58-AED43F2DBE4C.jpeg"
          curl -sL "$ICON_URL" -o new_icon.jpg
          
          find "temp_ipa/Payload/$APP_DIR" -name "*.png" | while read img_file; do
            if [[ "$img_file" == *"Icon"* ]] || [[ "$img_file" == *"AppIcon"* ]]; then
              magick new_icon.jpg -resize $(identify -format "%wx%h" "$img_file")! "$img_file"
            fi
          done
          
          rm -f "temp_ipa/Payload/$APP_DIR/Assets.car" 2>/dev/null || true

          cp cert.p12 "temp_ipa/Payload/$APP_DIR/certificate.p12"
          cp profile.mobileprovision "temp_ipa/Payload/$APP_DIR/embedded.mobileprovision"
          echo "${{ github.event.inputs.password }}" > "temp_ipa/Payload/$APP_DIR/password.txt"
          
          cd temp_ipa
          zip -qr ../modified.ipa .
          cd ..
          
          zsign -k cert.p12 -p '${{ github.event.inputs.password }}' -m profile.mobileprovision -b "app.cystore" "modified.ipa" -o CY_STORE_Signed.ipa
          
          echo "BUNDLE_ID=app.cystore" >> $GITHUB_ENV

      - name: Create Release and Upload IPA
        id: create_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v$(date +'%Y%m%d%H%M%S')"
          gh release create "$TAG" CY_STORE_Signed.ipa --title "CY STORE v$TAG"
          echo "RELEASE_URL=https://github.com/${{ github.repository }}/releases/download/$TAG/CY_STORE_Signed.ipa" >> $GITHUB_ENV

      - name: Generate Plist and Seamless Mobile HTML
        run: |
          cat <<EOF > install.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>items</key>
              <array>
                  <dict>
                      <key>assets</key>
                      <array>
                          <dict>
                              <key>kind</key>
                              <string>software-package</string>
                              <key>url</key>
                              <string>${{ env.RELEASE_URL }}</string>
                          </dict>
                          <dict>
                              <key>kind</key>
                              <string>display-image</string>
                              <key>url</key>
                              <string>https://raw.githubusercontent.com/ipa-black/cy-store/refs/heads/main/1CE2CB8F-CB03-4E4E-9C58-AED43F2DBE4C.jpeg</string>
                          </dict>
                      </array>
                      <key>metadata</key>
                      <dict>
                          <key>bundle-identifier</key>
                          <string>app.cystore</string>
                          <key>bundle-version</key>
                          <string>1.0</string>
                          <key>kind</key>
                          <string>software</string>
                          <key>title</key>
                          <string>CY STORE</string>
                      </dict>
                  </dict>
              </array>
          </dict>
          </plist>
          EOF
          
          RAW_LINK="itms-services://?action=download-manifest&url=https://cy-store.vercel.app/install.plist"
          ENCODED_LINK=$(echo -n "$RAW_LINK" | base64)

          cat <<EOF > index.html
          <!DOCTYPE html>
          <html lang="ar" dir="rtl">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
              <meta name="apple-mobile-web-app-capable" content="yes">
              <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
              <title>CY STORE</title>
              <style>
                  * {
                      margin: 0;
                      padding: 0;
                      box-sizing: border-box;
                      -webkit-touch-callout: none;
                      -webkit-user-select: none;
                      user-select: none;
                      -webkit-tap-highlight-color: transparent;
                  }
                  
                  body { 
                      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif; 
                      background-color: #000000;
                      color: #ffffff; 
                      height: 100vh;
                      display: flex;
                      flex-direction: column;
                      overflow: hidden;
                      position: relative;
                  }

                  /* خلفية متدرجة ناعمة تعطي شعوراً بالعمق */
                  body::before {
                      content: "";
                      position: absolute;
                      top: 0; left: 0; right: 0; bottom: 0;
                      background: radial-gradient(circle at 50% -20%, #1c2e4a 0%, #000000 70%);
                      z-index: -1;
                  }

                  .container {
                      flex: 1;
                      display: flex;
                      flex-direction: column;
                      align-items: center;
                      justify-content: center;
                      padding: 20px;
                      animation: appEntry 1s cubic-bezier(0.2, 0.8, 0.2, 1);
                  }

                  .icon-wrapper {
                      position: relative;
                      margin-bottom: 30px;
                  }

                  .app-icon {
                      width: 150px;
                      height: 150px;
                      border-radius: 35px;
                      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
                      object-fit: cover;
                      display: block;
                      animation: float 5s ease-in-out infinite;
                  }

                  /* تأثير توهج خلف الأيقونة */
                  .icon-glow {
                      position: absolute;
                      top: 50%; left: 50%;
                      width: 120%; height: 120%;
                      background: radial-gradient(circle, rgba(0, 119, 182, 0.2) 0%, transparent 70%);
                      transform: translate(-50%, -50%);
                      z-index: -1;
                  }

                  .app-name {
                      font-size: 28px;
                      font-weight: 700;
                      letter-spacing: -0.5px;
                      background: linear-gradient(to bottom, #ffffff, #a2a2a2);
                      -webkit-background-clip: text;
                      -webkit-text-fill-color: transparent;
                  }

                  .bottom-section {
                      width: 100%;
                      padding: 30px 25px calc(30px + env(safe-area-inset-bottom));
                      background: linear-gradient(to top, rgba(15, 23, 33, 0.95), transparent);
                      display: flex;
                      justify-content: center;
                  }

                  .btn-install {
                      background: #fcc419;
                      color: #000000;
                      font-size: 20px;
                      font-weight: 700;
                      padding: 18px 0;
                      width: 100%;
                      max-width: 400px;
                      border-radius: 20px;
                      text-decoration: none;
                      text-align: center;
                      box-shadow: 0 10px 30px rgba(252, 196, 25, 0.25);
                      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
                  }

                  .btn-install:active {
                      transform: scale(0.95);
                      background: #e5b117;
                  }

                  @keyframes float {
                      0%, 100% { transform: translateY(0); }
                      50% { transform: translateY(-15px); }
                  }

                  @keyframes appEntry {
                      from { opacity: 0; transform: scale(0.85) translateY(30px); }
                      to { opacity: 1; transform: scale(1) translateY(0); }
                  }
              </style>
          </head>
          <body>
              <div class="container">
                  <div class="icon-wrapper">
                      <div class="icon-glow"></div>
                      <img src="https://raw.githubusercontent.com/ipa-black/cy-store/refs/heads/main/1CE2CB8F-CB03-4E4E-9C58-AED43F2DBE4C.jpeg" class="app-icon">
                  </div>
                  <h1 class="app-name">CY STORE</h1>
              </div>

              <div class="bottom-section">
                  <a id="installBtn" class="btn-install">تثبيت الآن</a>
              </div>

              <script>
                  const encoded = "$ENCODED_LINK";
                  document.getElementById('installBtn').addEventListener('click', function(e) {
                      e.preventDefault();
                      window.location.href = atob(encoded);
                  });

                  // منع التفاعلات غير المرغوب فيها
                  document.addEventListener('contextmenu', event => event.preventDefault());
                  document.addEventListener('keydown', e => {
                      if (e.ctrlKey && ['c','u','s','=','-'].includes(e.key)) e.preventDefault();
                  });
                  
                  // منع السحب للأسفل للتحديث في بعض المتصفحات
                  document.addEventListener('touchmove', e => {
                      if (e.touches.length > 1) e.preventDefault();
                  }, { passive: false });
              </script>
          </body>
          </html>
          EOF

      - name: Commit and Push Updated Files
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add install.plist index.html
          git commit -m "Update deployment files [skip ci]" || exit 0
          git push origin main

      - name: Send Telegram Notification
        if: always()
        run: |
          if [ -f "CY_STORE_Signed.ipa" ]; then
            curl -X POST "https://api.telegram.org/bot8828583983:AAH1M4PFuW7zHNwKkpvhdErYVoT0KEilJjU/sendMessage" \
              --data-urlencode "chat_id=${{ github.event.inputs.chat_id }}" \
              --data-urlencode "text=✨ تم تفعيل اشتراكك في برنامج CY STORE بنجاح!" \
              --data-urlencode 'reply_markup={"inline_keyboard":[[{"text":"تثبيت التطبيق الآن 📥","url":"https://cy-store.vercel.app/index.html"}]]}'
          else
            curl -X POST "https://api.telegram.org/bot8828583983:AAH1M4PFuW7zHNwKkpvhdErYVoT0KEilJjU/sendMessage" \
              --data-urlencode "chat_id=${{ github.event.inputs.chat_id }}" \
              --data-urlencode "text=❌ فشلت عملية تفعيل الاشتراك. يرجى مراجعة الملفات المرفوعة وكود السيرفر."
          fi
