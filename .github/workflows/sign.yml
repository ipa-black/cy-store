name: Sign CY STORE Automation

on:
  workflow_dispatch:
    inputs:
      p12_base64:
        description: 'Base64 of p12 cert'
        required: true
      prov_base64:
        description: 'Base64 of mobileprovision'
        required: true
      password:
        description: 'p12 Password'
        required: true
      chat_id:
        description: 'Telegram Chat ID'
        required: true

jobs:
  sign_and_release:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Decode Certificates
        run: |
          echo "${{ github.event.inputs.p12_base64 }}" | base64 --decode > cert.p12
          echo "${{ github.event.inputs.prov_base64 }}" | base64 --decode > profile.mobileprovision

      - name: Install zsign
        run: brew install zsign

      - name: Inject Certs and Sign IPA
        run: |
          ORIGINAL_IPA=$(ls *.ipa | head -n 1)
          # 1. فك ضغط التطبيق
          unzip -q "$ORIGINAL_IPA" -d temp_ipa
          APP_DIR=$(ls temp_ipa/Payload/)
          
          # 2. حقن الشهادات داخل التطبيق (للوصول البرمجي السريع)
          cp cert.p12 "temp_ipa/Payload/$APP_DIR/certificate.p12"
          cp profile.mobileprovision "temp_ipa/Payload/$APP_DIR/embedded.mobileprovision"
          
          # 3. استخراج البندل آيدي الأصلي لضمان التطابق
          PLIST_PATH="temp_ipa/Payload/$APP_DIR/Info.plist"
          APP_BUNDLE_ID=$(plutil -extract CFBundleIdentifier raw "$PLIST_PATH" || echo "com.cystore.app")
          echo "BUNDLE_ID=$APP_BUNDLE_ID" >> $GITHUB_ENV
          
          # 4. إعادة ضغط التطبيق
          cd temp_ipa
          zip -qr ../modified.ipa .
          cd ..
          
          # 5. التوقيع النهائي
          zsign -k cert.p12 -p '${{ github.event.inputs.password }}' -m profile.mobileprovision "modified.ipa" -o CY_STORE_Signed.ipa

      - name: Create Release and Upload
        id: create_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v$(date +'%Y%m%d%H%M%S')"
          gh release create "$TAG" CY_STORE_Signed.ipa --title "CY STORE $TAG"
          echo "RELEASE_URL=https://github.com/${{ github.repository }}/releases/download/$TAG/CY_STORE_Signed.ipa" >> $GITHUB_ENV

      - name: Generate Plist and Professional Web Page
        run: |
          cat <<EOF > install.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>items</key>
              <array>
                  <dict>
                      <key>assets</key>
                      <array>
                          <dict>
                              <key>kind</key>
                              <string>software-package</string>
                              <key>url</key>
                              <string>${{ env.RELEASE_URL }}</string>
                          </dict>
                      </array>
                      <key>metadata</key>
                      <dict>
                          <key>bundle-identifier</key>
                          <string>${{ env.BUNDLE_ID }}</string>
                          <key>bundle-version</key>
                          <string>1.0</string>
                          <key>kind</key>
                          <string>software</string>
                          <key>title</key>
                          <string>CY STORE</string>
                      </dict>
                  </dict>
              </array>
          </dict>
          </plist>
          EOF
          
          cat <<EOF > index.html
          <!DOCTYPE html>
          <html lang="ar" dir="rtl">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>تفعيل CY STORE</title>
              <style>
                  body { font-family: -apple-system, sans-serif; background: #000; color: #fff; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
                  .card { background: #1c1c1e; padding: 30px; border-radius: 20px; text-align: center; width: 80%; max-width: 350px; }
                  .btn { display: block; background: #007aff; color: #fff; padding: 15px; border-radius: 12px; text-decoration: none; font-weight: bold; margin-top: 20px; }
              </style>
          </head>
          <body>
              <div class="card">
                  <h2>تم تفعيل اشتراكك!</h2>
                  <p>تطبيق CY STORE جاهز للتثبيت على جهازك.</p>
                  <a href="itms-services://?action=download-manifest&url=https://cy-store.vercel.app/install.plist" class="btn">تثبيت الآن</a>
              </div>
          </body>
          </html>
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add install.plist index.html
          git commit -m "Update install files [skip ci]" || exit 0
          git push origin main

      - name: Send Notification
        if: always()
        run: |
          if [ -f "CY_STORE_Signed.ipa" ]; then
            curl -X POST "https://api.telegram.org/bot8828583983:AAH1M4PFuW7zHNwKkpvhdErYVoT0KEilJjU/sendMessage" \
              --data-urlencode "chat_id=${{ github.event.inputs.chat_id }}" \
              --data-urlencode "text=✨ تم تفعيل اشتراكك في برنامج CY STORE بنجاح!" \
              --data-urlencode 'reply_markup={"inline_keyboard":[[{"text":"تثبيت التطبيق الآن 📥","url":"https://cy-store.vercel.app/index.html"}]]}'
          else
            curl -X POST "https://api.telegram.org/bot8828583983:AAH1M4PFuW7zHNwKkpvhdErYVoT0KEilJjU/sendMessage" \
              --data-urlencode "chat_id=${{ github.event.inputs.chat_id }}" \
              --data-urlencode "text=❌ فشل التفعيل. تأكد من الملفات والباسورد."
          fi
