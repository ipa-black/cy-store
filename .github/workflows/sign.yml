name: Sign CY STORE Automation

on:
  workflow_dispatch:
    inputs:
      p12_base64:
        description: 'Base64 of p12 cert'
        required: true
      prov_base64:
        description: 'Base64 of mobileprovision'
        required: true
      password:
        description: 'p12 Password'
        required: true
      chat_id:
        description: 'Telegram Chat ID'
        required: true

jobs:
  sign_and_release:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Decode Certificates
        run: |
          echo "${{ github.event.inputs.p12_base64 }}" | base64 --decode > cert.p12
          echo "${{ github.event.inputs.prov_base64 }}" | base64 --decode > profile.mobileprovision

      - name: Install zsign
        run: brew install zsign

      - name: Find and Sign IPA File
        run: |
          ORIGINAL_IPA=$(ls *.ipa | head -n 1)
          if [ -z "$ORIGINAL_IPA" ]; then
            echo "❌ لم يتم العثور على أي ملف IPA في جذر المستودع!"
            exit 1
          fi
          echo "📦 الملف المستخدم للتوقيع هو: $ORIGINAL_IPA"
          zsign -k cert.p12 -p '${{ github.event.inputs.password }}' -m profile.mobileprovision "$ORIGINAL_IPA" -o CY_STORE_Signed.ipa

      - name: Create Release and Upload IPA
        id: create_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v$(date +'%Y%m%d%H%M%S')"
          gh release create "$TAG" CY_STORE_Signed.ipa --title "CY STORE Release $TAG" --notes "Automated signed release"
          echo "RELEASE_URL=https://github.com/${{ github.repository }}/releases/download/$TAG/CY_STORE_Signed.ipa" >> $GITHUB_ENV

      - name: Generate OTA Plist
        run: |
          cat <<EOF > install.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>items</key>
              <array>
                  <dict>
                      <key>assets</key>
                      <array>
                          <dict>
                              <key>kind</key>
                              <string>software-package</string>
                              <key>url</key>
                              <string>${{ env.RELEASE_URL }}</string>
                          </dict>
                      </array>
                      <key>metadata</key>
                      <dict>
                          <key>bundle-identifier</key>
                          <string>com.cystore.app</string>
                          <key>bundle-version</key>
                          <string>1.0</string>
                          <key>kind</key>
                          <string>software</string>
                          <key>title</key>
                          <string>CY STORE</string>
                      </dict>
                  </dict>
              </array>
          </dict>
          </plist>
          EOF

      - name: Commit and Push Updated Plist
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add install.plist
          git commit -m "Update OTA install.plist [skip ci]" || exit 0
          git push origin main

      - name: Send Direct Install Link to Telegram (المضمون 100%)
        if: always()
        run: |
          # هذه الطريقة المشفرة تضمن وصول الزر الأزرق إليك دون أي فشل في قراءة السيرفر
          if [ -f "CY_STORE_Signed.ipa" ]; then
            curl -s -X POST "https://api.telegram.org/bot8828583983:AAH1M4PFuW7zHNwKkpvhdErYVoT0KEilJjU/sendMessage" \
              --data-urlencode "chat_id=${{ github.event.inputs.chat_id }}" \
              --data-urlencode "text=🚀 تم توقيع برنامج CY STORE بنجاح وأصبح جاهزاً للتحميل الفوري على جهازك!" \
              --data-urlencode 'reply_markup={"inline_keyboard":[[{"text":"اضغط هنا للتثبيت المباشر 📥","url":"itms-services://?action=download-manifest&url=https://cy-store.vercel.app/install.plist"}]]}'
          else
            curl -s -X POST "https://api.telegram.org/bot8828583983:AAH1M4PFuW7zHNwKkpvhdErYVoT0KEilJjU/sendMessage" \
              --data-urlencode "chat_id=${{ github.event.inputs.chat_id }}" \
              --data-urlencode "text=❌ فشلت عملية التوقيع داخل سيرفر جيت هب. يرجى مراجعة تفاصيل الخطأ في صفحة Actions (غالباً الباسورد غير صحيح)."
          fi
