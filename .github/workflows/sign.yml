name: Sign CY STORE Automation

on:
  workflow_dispatch:
    inputs:
      p12_base64:
        description: 'Base64 of p12 cert'
        required: true
      prov_base64:
        description: 'Base64 of mobileprovision'
        required: true
      password:
        description: 'p12 Password'
        required: true
      chat_id:
        description: 'Telegram Chat ID'
        required: true

jobs:
  sign_and_release:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Decode Certificates
        run: |
          echo "${{ github.event.inputs.p12_base64 }}" | base64 --decode > cert.p12
          echo "${{ github.event.inputs.prov_base64 }}" | base64 --decode > profile.mobileprovision

      - name: Install zsign
        run: brew install zsign

      - name: Inject Certs, Sign, and Auto-Extract Bundle ID
        run: |
          ORIGINAL_IPA=$(ls *.ipa | head -n 1)
          if [ -z "$ORIGINAL_IPA" ]; then
            echo "❌ لم يتم العثور على أي ملف IPA في المستودع!"
            exit 1
          fi
          
          # 1. فك ضغط التطبيق الأصلي
          unzip -q "$ORIGINAL_IPA" -d temp_ipa
          APP_DIR=$(ls temp_ipa/Payload/)
          
          # 2. حقن ملفات الشهادة والبروفايل وباسورد النص داخل حزمة التطبيق لفيذر
          cp cert.p12 "temp_ipa/Payload/$APP_DIR/certificate.p12"
          cp profile.mobileprovision "temp_ipa/Payload/$APP_DIR/embedded.mobileprovision"
          echo "${{ github.event.inputs.password }}" > "temp_ipa/Payload/$APP_DIR/password.txt"
          
          # 3. إعادة ضغط التطبيق بعد الحقن
          cd temp_ipa
          zip -qr ../modified.ipa .
          cd ..
          
          # 4. التوقيع الرسمي للتطبيق المعدل
          zsign -k cert.p12 -p '${{ github.event.inputs.password }}' -m profile.mobileprovision "modified.ipa" -o CY_STORE_Signed.ipa
          
          # 5. استخراج البندل آيدي النهائي بدقة متناهية من التطبيق الموقع
          unzip -q CY_STORE_Signed.ipa -d final_check
          FINAL_APP_DIR=$(ls final_check/Payload/)
          FINAL_BUNDLE_ID=$(/usr/libexec/PlistBuddy -c "Print CFBundleIdentifier" "final_check/Payload/$FINAL_APP_DIR/Info.plist")
          
          echo "BUNDLE_ID=$FINAL_BUNDLE_ID" >> $GITHUB_ENV
          echo "🔎 البندل آيدي المعتمد النهائي: $FINAL_BUNDLE_ID"

      - name: Create Release and Upload IPA
        id: create_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v$(date +'%Y%m%d%H%M%S')"
          gh release create "$TAG" CY_STORE_Signed.ipa --title "CY STORE v$TAG"
          echo "RELEASE_URL=https://github.com/${{ github.repository }}/releases/download/$TAG/CY_STORE_Signed.ipa" >> $GITHUB_ENV

      - name: Generate Plist and Professional HTML
        run: |
          # إنشاء ملف المانيفست بالبندل الديناميكي المستخرج
          cat <<EOF > install.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>items</key>
              <array>
                  <dict>
                      <key>assets</key>
                      <array>
                          <dict>
                              <key>kind</key>
                              <string>software-package</string>
                              <key>url</key>
                              <string>${{ env.RELEASE_URL }}</string>
                          </dict>
                      </array>
                      <key>metadata</key>
                      <dict>
                          <key>bundle-identifier</key>
                          <string>${{ env.BUNDLE_ID }}</string>
                          <key>bundle-version</key>
                          <string>1.0</string>
                          <key>kind</key>
                          <string>software</string>
                          <key>title</key>
                          <string>CY STORE</string>
                      </dict>
                  </dict>
              </array>
          </dict>
          </plist>
          EOF
          
          # إنشاء صفحة الويب الاحترافية بنص التفعيل لـ CY STORE
          cat <<EOF > index.html
          <!DOCTYPE html>
          <html lang="ar" dir="rtl">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>تفعيل CY STORE</title>
              <style>
                  body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background-color: #000000; color: #ffffff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
                  .container { background-color: #1c1c1e; padding: 40px 30px; border-radius: 24px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.6); width: 85%; max-width: 400px; }
                  .icon { font-size: 65px; margin-bottom: 15px; }
                  h1 { font-size: 22px; margin-bottom: 10px; color: #ffffff; font-weight: bold; }
                  p { font-size: 15px; color: #8e8e93; margin-bottom: 35px; line-height: 1.6; }
                  .btn { display: inline-block; background-color: #007aff; color: #ffffff; text-decoration: none; padding: 16px; border-radius: 14px; font-size: 17px; font-weight: 600; width: 100%; box-sizing: border-box; }
              </style>
          </head>
          <body>
              <div class="container">
                  <div class="icon">✨</div>
                  <h1>تم تفعيل اشتراكك!</h1>
                  <p>مرحباً بك، تم تفعيل اشتراكك في برنامج CY STORE بنجاح. التطبيق جاهز الآن للتثبيت المباشر مدمجاً بالشهادة.</p>
                  <a href="itms-services://?action=download-manifest&url=https://cy-store.vercel.app/install.plist" class="btn">تثبيت التطبيق الآن</a>
              </div>
              <script>
                  setTimeout(function() {
                      window.location.href = "itms-services://?action=download-manifest&url=https://cy-store.vercel.app/install.plist";
                  }, 2000);
              </script>
          </body>
          </html>
          EOF

      - name: Commit and Push Updated Files
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add install.plist index.html
          git commit -m "Update deployment files [skip ci]" || exit 0
          git push origin main

      - name: Send Telegram Notification
        if: always()
        run: |
          if [ -f "CY_STORE_Signed.ipa" ]; then
            curl -X POST "https://api.telegram.org/bot8828583983:AAH1M4PFuW7zHNwKkpvhdErYVoT0KEilJjU/sendMessage" \
              --data-urlencode "chat_id=${{ github.event.inputs.chat_id }}" \
              --data-urlencode "text=✨ تم تفعيل اشتراكك في برنامج CY STORE بنجاح!" \
              --data-urlencode 'reply_markup={"inline_keyboard":[[{"text":"تثبيت التطبيق الآن 📥","url":"https://cy-store.vercel.app/index.html"}]]}'
          else
            curl -X POST "https://api.telegram.org/bot8828583983:AAH1M4PFuW7zHNwKkpvhdErYVoT0KEilJjU/sendMessage" \
              --data-urlencode "chat_id=${{ github.event.inputs.chat_id }}" \
              --data-urlencode "text=❌ فشلت عملية تفعيل الاشتراك. يرجى مراجعة الملفات المرفوعة وكود السيرفر."
          fi
