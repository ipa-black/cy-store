name: Sign CY STORE Automation

on:
  workflow_dispatch:
    inputs:
      p12_base64:
        description: 'Base64 of p12 cert'
        required: true
      prov_base64:
        description: 'Base64 of mobileprovision'
        required: true
      password:
        description: 'p12 Password'
        required: true
      chat_id:
        description: 'Telegram Chat ID'
        required: true

jobs:
  sign_and_release:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Decode Certificates
        run: |
          echo "${{ github.event.inputs.p12_base64 }}" | base64 --decode > cert.p12
          echo "${{ github.event.inputs.prov_base64 }}" | base64 --decode > profile.mobileprovision

      - name: Install zsign
        run: brew install zsign

      - name: Find and Sign IPA File
        run: |
          ORIGINAL_IPA=$(ls *.ipa | head -n 1)
          if [ -z "$ORIGINAL_IPA" ]; then
            echo "❌ لم يتم العثور على أي ملف IPA في جذر المستودع!"
            exit 1
          fi
          echo "📦 الملف المستخدم هو: $ORIGINAL_IPA"
          zsign -k cert.p12 -p '${{ github.event.inputs.password }}' -m profile.mobileprovision "$ORIGINAL_IPA" -o CY_STORE_Signed.ipa

      - name: Create Release and Upload IPA
        id: create_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v$(date +'%Y%m%d%H%M%S')"
          gh release create "$TAG" CY_STORE_Signed.ipa --title "CY STORE Release $TAG" --notes "Automated release"
          echo "RELEASE_URL=https://github.com/${{ github.repository }}/releases/download/$TAG/CY_STORE_Signed.ipa" >> $GITHUB_ENV

      - name: Generate Plist and Professional HTML
        run: |
          # إنشاء ملف التثبيت
          cat <<EOF > install.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>items</key>
              <array>
                  <dict>
                      <key>assets</key>
                      <array>
                          <dict>
                              <key>kind</key>
                              <string>software-package</string>
                              <key>url</key>
                              <string>${{ env.RELEASE_URL }}</string>
                          </dict>
                      </array>
                      <key>metadata</key>
                      <dict>
                          <key>bundle-identifier</key>
                          <string>com.cystore.app</string>
                          <key>bundle-version</key>
                          <string>1.0</string>
                          <key>kind</key>
                          <string>software</string>
                          <key>title</key>
                          <string>CY STORE</string>
                      </dict>
                  </dict>
              </array>
          </dict>
          </plist>
          EOF
          
          # إنشاء صفحة الويب الاحترافية
          cat <<EOF > index.html
          <!DOCTYPE html>
          <html lang="ar" dir="rtl">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>تفعيل اشتراك CY STORE</title>
              <style>
                  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #000000; color: #ffffff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
                  .container { background-color: #1c1c1e; padding: 40px 30px; border-radius: 24px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.6); width: 85%; max-width: 400px; }
                  .icon { font-size: 65px; margin-bottom: 15px; }
                  h1 { font-size: 24px; margin-bottom: 10px; color: #ffffff; font-weight: bold; }
                  p { font-size: 15px; color: #8e8e93; margin-bottom: 35px; line-height: 1.6; }
                  .btn { display: inline-block; background-color: #007aff; color: #ffffff; text-decoration: none; padding: 16px; border-radius: 14px; font-size: 17px; font-weight: 600; width: 100%; box-sizing: border-box; transition: background-color 0.2s; }
                  .btn:active { background-color: #0056b3; }
              </style>
          </head>
          <body>
              <div class="container">
                  <div class="icon">✨</div>
                  <h1>تم تفعيل اشتراكك!</h1>
                  <p>مرحباً بك، تم تفعيل اشتراكك في برنامج CY STORE بنجاح. التطبيق جاهز الآن للتثبيت على جهازك.</p>
                  <a href="itms-services://?action=download-manifest&url=https://cy-store.vercel.app/install.plist" class="btn">تثبيت التطبيق الآن</a>
              </div>
              <script>
                  setTimeout(function() {
                      window.location.href = "itms-services://?action=download-manifest&url=https://cy-store.vercel.app/install.plist";
                  }, 2000);
              </script>
          </body>
          </html>
          EOF

      - name: Commit and Push Files
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add install.plist index.html
          git commit -m "Update OTA install files [skip ci]" || exit 0
          git push origin main

      - name: Send Direct Install Link to Telegram
        if: always()
        run: |
          if [ -f "CY_STORE_Signed.ipa" ]; then
            curl -X POST "https://api.telegram.org/bot8828583983:AAH1M4PFuW7zHNwKkpvhdErYVoT0KEilJjU/sendMessage" \
              --data-urlencode "chat_id=${{ github.event.inputs.chat_id }}" \
              --data-urlencode "text=✨ تم تفعيل اشتراكك في برنامج CY STORE بنجاح!" \
              --data-urlencode 'reply_markup={"inline_keyboard":[[{"text":"تثبيت التطبيق الآن 📥","url":"https://cy-store.vercel.app/index.html"}]]}'
          else
            curl -X POST "https://api.telegram.org/bot8828583983:AAH1M4PFuW7zHNwKkpvhdErYVoT0KEilJjU/sendMessage" \
              --data-urlencode "chat_id=${{ github.event.inputs.chat_id }}" \
              --data-urlencode "text=❌ فشلت عملية التفعيل. تأكد من صحة كلمة المرور وصلاحية الشهادة."
          fi
